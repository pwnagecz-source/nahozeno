<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendář akcí | Nahozeno.cz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .event-list { margin-top: 30px; }
        .event-row { 
            display: grid; 
            grid-template-columns: 120px 1fr 180px; 
            background: white; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            align-items: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid var(--accent);
        }
        .event-date { 
            background: #f8f9fa; 
            text-align: center; 
            padding: 20px 10px; 
            font-weight: bold; 
            line-height: 1.2;
        }
        .event-date span { display: block; font-size: 1.8rem; color: var(--primary); }
        .event-content { padding: 0 25px; }
        .event-title { font-size: 1.2rem; font-weight: bold; margin: 0; color: #333; }
        .event-loc { font-size: 0.9rem; color: #777; margin-top: 4px; }
        .event-action { padding: 20px; text-align: right; }
        .btn-join { 
            background: var(--primary); 
            color: white; 
            padding: 8px 16px; 
            border-radius: 5px; 
            text-decoration: none; 
            font-size: 0.9rem;
        }
        .btn-join:hover { background: var(--accent); }

        @media (max-width: 600px) {
            .event-row { grid-template-columns: 1fr; text-align: center; }
            .event-action { text-align: center; padding-top: 0; padding-bottom: 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">NAHOZENO<span>.cz</span></a>
            <div class="nav-links">
                <a href="/">Magazín</a>
                <a href="/ulovky">Galerie úlovků</a>
                <a href="/reviry">Atlas revírů</a>
                <a href="/kalendar" style="color: white; font-weight: bold;">Kalendář akcí</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <header style="margin-bottom: 40px;">
            <h1 style="color: var(--primary);">Rybářské akce a závody 2026</h1>
            <p>Nezmeškejte žádnou důležitou událost u vody.</p>
        </header>

        <div class="event-list">
            {% for akce in akce %}
            <div class="event-row">
                <div class="event-date">
                    <span>{{ akce.den }}</span> {{ akce.mesic }}
                </div>
                <div class="event-content">
                    <p class="event-title">{{ akce.nazev }}</p>
                    <p class="event-loc">📍 {{ akce.misto }} | 🕒 {{ akce.cas }}</p>
                </div>
                <div class="event-action">
                    <a href="#" class="btn-join">Více informací</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
